<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, tr, th, td{
            border : 1px solid silver; /* 2px 크기의 검은색 선(solid) */
            border-collapse: collapse; /* 겹치는 선을 하나로 */
            padding: 10px 10px;  /* 상하 5px 좌우 20px */
            font-size: small;

        }
        .box{
            width: 800px;
            height: 100px;
            background-color: #4CA649;
            color: aliceblue;
            font-weight: bold;
            margin: 10px;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            font-size: 20px;
        }
        .center{
            margin-top: 10px;
            margin-left: 10px;
        }
        #contents{
            width: 800px;
            height: 700px;
            margin: 10px;
            border: 2px solid silver;
            box-shadow: 3px 3px 10px silver;
            border-radius: 10px;
        }
        .bold-font{
            font-weight: bold;
        }
        .table-back{
            background-color: rgb(222, 223, 224);
        }
    </style>
</head>
<body>
    <div class="box">자바 수강생 모집<br>
        자바에 관심 있는 새내기 여러분을 모집합니다.</div>
    <div id="contents">
        <div class="bold-font center">교내 프로그래밍 동아리에서 <span style="color: blue;">신입생</span>을 대상으로 자바 수강생을 모집합니다.</div>
        <div class="bold-font" style="color: red; margin-left: 10px;">학부나 전공에 상관없습니다.</div>
        <div class="bold-font" style="margin-left: 10px;">평소 방송에 관심있었던 여러 학우들의 지원바랍니다.</div>
        <table class="center">
            <tr>
                <th class="table-back">모집 기간</th>
                <td>2월 5일 ~ 2월 11일</td>
            </tr>
            <tr>
                <th class="table-back">모집 분야</th>
                <td>자바 기초, 자바 심화, 백엔드 입문</td>
            </tr>
            <tr>
                <th class="table-back">지원 방법</th>
                <td>양식 작성 후 이메일 접수<br>
                <span style="font-style: italic;">지원서 양식은 교내 동아리 홈페이지 공지 게시판에 있습니다.</span></td>
            </tr>
        </table>
        <div class="bold-font center">혜택</div>
        <div>
            <ul>
                <li>아주 작은 소정의 활동비 지급</li>
                <li>주기적인 회식</li>
            </ul>
        </div>
        <img src="java_img.jpg">
    </div>
</body>

</html>
